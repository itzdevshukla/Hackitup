{% extends "dashboard/base.html" %}

{% block title %}Access Restricted{% endblock %}

{% block extra_css %}
<style>
/* ================= HARD LOCK SCROLL ================= */
html, body {
    height: 100%;
    overflow: hidden;
}

/* ================= FULLSCREEN WRAPPER ================= */
.ban-wrapper{
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: transparent;
}

/* ================= CARD ================= */
.ban-card{
    max-width: 620px;
    width: 90%;
    text-align: center;
    background: linear-gradient(
        135deg,
        rgba(40,0,0,.85),
        rgba(20,0,0,.95)
    );
    border: 1px solid rgba(255,77,77,.6);
    border-radius: 28px;
    padding: 52px 42px;
    box-shadow:
        0 0 45px rgba(255,77,77,.45),
        inset 0 0 25px rgba(255,77,77,.18);
}

/* ================= ICON ================= */
.ban-icon{
    font-size: 4.2rem;
    margin-bottom: 20px;
    color: #ff4d4d;
    text-shadow: 0 0 28px rgba(255,77,77,.9);
}

/* ================= TEXT ================= */
.ban-card h1{
    font-family: Orbitron, sans-serif;
    font-size: 2.3rem;
    color: #ff4d4d;
    margin-bottom: 14px;
}

.ban-card p{
    color: #ffdada;
    font-size: 1rem;
    line-height: 1.7;
    margin-bottom: 36px;
}

/* ================= BUTTON ================= */
.ban-btn{
    display: inline-block;
    padding: 15px 40px;
    border-radius: 34px;
    border: 2px solid #ff4d4d;
    color: #ff4d4d;
    font-weight: 800;
    text-decoration: none;
    letter-spacing: 1.4px;
    transition: .3s;
}

.ban-btn:hover{
    background: #ff4d4d;
    color: #000;
    box-shadow: 0 0 30px rgba(255,77,77,.85);
}
</style>
{% endblock %}

{% block content %}
<div class="ban-wrapper">

    <div class="ban-card">
        <div class="ban-icon">🚫</div>

        <h1>ACCESS RESTRICTED</h1>

        <p>
            You have been removed from<br>
            <strong>{{ event.event_name }}</strong><br>
            by the event administrators.
        </p>

        <a href="{% url 'dashboard' %}" class="ban-btn">
            RETURN TO DASHBOARD
        </a>
    </div>

</div>
{% endblock %}
