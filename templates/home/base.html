{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>{% block title %}{% endblock %}</title>

    <!-- FONTS -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&display=swap"
        rel="stylesheet">

    <style>
        /* CYBERPUNK NEON CYAN SCROLLBAR */
        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0, 20, 30, 0.4);
            border-left: 1px solid rgba(0, 255, 255, 0.15);
        }

        ::-webkit-scrollbar-thumb {
            background: #00eaff;
            border-radius: 10px;
            box-shadow: 0 0 10px #00eaff;
        }

        /* Hover glow */
        ::-webkit-scrollbar-thumb:hover {
            background: #18ffff;
            box-shadow: 0 0 18px #00eaff;
        }

        /* GLOBAL */
        body {
            margin: 0;
            font-family: "Share Tech Mono", monospace;
            background: #000;
            color: #00eaff;
            overflow-x: hidden;
        }

        /* MATRIX BG */
        #matrix {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
        }

        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.65);
            z-index: -1;
        }

        /* NAVBAR */
        .gm-nav {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 85%;
            height: 75px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
            background: rgba(0, 20, 30, 0.55);
            border: 1px solid rgba(0, 255, 255, 0.35);
            backdrop-filter: blur(12px);
            border-radius: 60px;
            box-shadow: 0 0 22px rgba(0, 255, 255, 0.25);
            z-index: 99999;
        }

        .gm-logo-box {
            height: 65px;
            width: 65px;
            background: rgba(0, 255, 255, 0.10);
            border: 1px solid rgba(0, 255, 255, 0.30);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .gm-logo-img {
            height: 50px;
            width: 50px;
            border-radius: 50%;
            object-fit: cover;
            filter: drop-shadow(0 0 10px #00eaff);
        }

        .gm-center-links {
            display: flex;
            gap: 50px;
        }

        .gm-center-links a {
            color: #d5f8ff;
            text-decoration: none;
            font-size: 1.15rem;
            transition: 0.25s;
        }

        .gm-center-links a:hover {
            color: #00eaff;
            text-shadow: 0 0 10px #00eaff;
        }

        .gm-register-btn {
            padding: 10px 35px;
            border-radius: 35px;
            background: rgba(0, 255, 255, 0.18);
            border: 1px solid #00eaff;
            color: #00eaff;
            font-weight: 600;
            text-decoration: none;
            transition: 0.3s;
        }

        .gm-register-btn:hover {
            background: #00eaff;
            color: #000 !important;
            box-shadow: 0 0 18px #00eaff;
        }

        /* PAGE CONTENT WRAPPER */
        .page-content {
            margin-top: 150px;
            /* ensures navbar doesn't overlap */
        }
    </style>

    <!-- Extra page CSS -->
    {% block extra_css %}{% endblock %}

</head>

<body>

    <!-- MATRIX BACKGROUND -->
    <canvas id="matrix"></canvas>
    <div class="overlay"></div>

    <!-- NAVBAR -->
    <nav class="gm-nav">
        <div class="gm-logo-box">
            <img src="{% static 'images/logo2.png' %}" class="gm-logo-img">
        </div>

        <div class="gm-center-links">
            <a href="/">Home</a>
            <a href="/about">About Us</a>
            <a href="/profile">Profile</a>
            <a href="/leaderboard">Leaderboard</a>
        </div>

        <a href="{% url 'register' %}" class="gm-register-btn">Register →</a>
    </nav>

    <!-- PAGE -->
    <div class="page-content">
        {% block content %}
        {% endblock %}
    </div>

    <!-- MATRIX SCRIPT -->
    <script>
        const canvas = document.getElementById("matrix");
        const ctx = canvas.getContext("2d");
        canvas.height = window.innerHeight; canvas.width = window.innerWidth;

        const chars = "01<>/*=+{}[]$#%&@ΛΨΩΣ";
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        let drops = [];
        for (let i = 0; i < columns; i++) drops[i] = 1;

        function draw() {
            ctx.fillStyle = "rgba(0,0,0,0.08)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#00eaff";
            ctx.font = fontSize + "px monospace";

            for (let i = 0; i < drops.length; i++) {
                const text = chars[Math.floor(Math.random() * chars.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(draw, 35);
    </script>

    <!-- Extra JS -->
    {% block extra_js %}{% endblock %}

</body>

</html>
